<head>

<style>

    --bg-secondary: #f8f9fa;

    --error: #e03131;

  body {

    flex-shrink: 0;
  }
  .logo {

    align-items: center;
    gap: 10px;
  }
  .logo-mark {
    width: 24px; height: 24px;
    background: var(--accent);
    clip-path: polygon(50% 0%, 100% 100%, 0% 100%);

  .logo-text {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.01em;
  }
  .logo-text span { color: var(--accent); }
  .status-pill {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    padding: 4px 12px;
    border-radius: 4px;
  }
  .status-pill.active { color: var(--accent); border-color: var(--accent-border); background: var(--accent-light); }

  .workspace {
    display: grid;
    grid-template-columns: 300px 1fr;
    flex: 1;
    overflow: hidden;
    height: calc(100vh - 53px);
  }

  .sidebar {
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    background: var(--bg-secondary);
    overflow: hidden;
  }
  .sidebar-section {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }
  .section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 8px;
    padding: 24px 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s ease;
    background: var(--surface);
  }
  .drop-zone:hover, .drop-zone.dragover {
    border-color: var(--accent);
    background: var(--accent-light);
  }
  .drop-zone.dragover { border-style: solid; }
  .drop-icon {
    width: 32px; height: 32px;
    margin: 0 auto 12px;
    color: var(--text-muted);
  }
  .drop-zone:hover .drop-icon, .drop-zone.dragover .drop-icon { color: var(--accent); }
  .drop-text {
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.5;
  }
  .drop-text strong { color: var(--accent); font-weight: 600; display: block; margin-bottom: 4px; }
  .drop-sub { font-size: 11px; color: var(--text-muted); margin-top: 8px; }

  .file-queue {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
  }
  .queue-empty {
    text-align: center;
    padding: 24px 12px;
    color: var(--text-muted);
    font-size: 12px;
  }
  .file-item {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: 10px 12px;
    border-radius: 6px;
    margin-bottom: 4px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 0.1s;
    gap: 8px;
    background: var(--surface);

  .file-item:hover { border-color: var(--border); }
  .file-item.selected { border-color: var(--accent-border); background: var(--accent-light); }

  .file-name {

    font-weight: 600;

  .file-title {

// Load EditType mappings from localStorage or use defaults
function loadEditTypeMap() {
  try {
    const saved = localStorage.getItem('afrosonic_edittype_map');
    if (saved) {
      return JSON.parse(saved);
    }
  } catch (e) {
    console.warn('Failed to load EditType map from localStorage');
  }
  return { ...DEFAULT_EDITTYPE_MAP };
}

// Save EditType mappings to localStorage
function saveEditTypeMap(map) {
  try {
    localStorage.setItem('afrosonic_edittype_map', JSON.stringify(map));
    state.editTypeMap = map;
  } catch (e) {
    console.error('Failed to save EditType map to localStorage');

}

function reformatISRC(isrc) {
  if (!isrc) return null;
  const s = String(isrc).trim().replace(/-/g, '');
  if (s.length === 12) {
    return `${s.slice(0,2)}-${s.slice(2,5)}-${s.slice(5,7)}-${s.slice(7,12)}`;
  }
  return isrc;
}

function formatReleaseDate(val) {
  if (!val) return null;
  let d;
  // With raw:true and cellDates:false, dates arrive as Excel serial numbers (e.g. 45769)
  if (typeof val === 'number') {
    // Excel epoch is Jan 1 1900; JS epoch is Jan 1 1970. Offset = 25569 days.
    // Also account for Excel's leap year bug (it thinks 1900 was a leap year).
    d = new Date(Math.round((val - 25569) * 86400 * 1000));
  } else if (val instanceof Date) {
    d = val;
  } else {
    d = new Date(val);
  }
  if (isNaN(d)) return String(val);
  return `${d.getUTCMonth() + 1}/${d.getUTCDate()}/${d.getUTCFullYear()}`;
}

function durationToSeconds(val) {
  if (val == null) return null;

  // With raw:true and cellDates:false, Excel time values always arrive as a decimal
  // fraction of one day. e.g. 04:41 stored as HH:MM gives 0.19514... 
  // Multiply by 86400 to get total seconds in HH:MM:SS space.
  // Harvest stores duration as MM:SS but Excel treats it as HH:MM:SS, so:
  //   floor(totalRawSecs / 3600) = what Excel calls "hours"  = our MINUTES
  //   floor((totalRawSecs % 3600) / 60) = what Excel calls "minutes" = our SECONDS
  if (typeof val === 'number' && val > 0 && val < 1) {
    const totalRawSecs = Math.round(val * 86400);
    const mins = Math.floor(totalRawSecs / 3600);
    const secs = Math.floor((totalRawSecs % 3600) / 60);
    return mins * 60 + secs;
  }

  // String fallback e.g. "04:41" — treat first segment as minutes
  if (typeof val === 'string') {
    const parts = val.trim().split(':').map(Number);
    if (parts.length >= 2) return parts[0] * 60 + parts[1];
  }

  return null;
}

function getEditType(audioFilename) {
  if (!audioFilename) return { code: 'Ful', description: state.editTypeMap['Ful'] || 'Full' };
  const f = String(audioFilename).toUpperCase();
  let code = 'Ful';
  if (/_30[_\s]|_30$|_30SEC/.test(f)) code = '30';
  else if (/_60[_\s]|_60$|_60SEC/.test(f)) code = '60';
  else if (/_20[_\s]|_20$/.test(f)) code = '20';
  else if (/_15[_\s]|_15$/.test(f)) code = '15';
  else if (/_10[_\s]|_10$/.test(f)) code = '10';
  else if (/STIL|STING|IDENT/.test(f)) code = 'Stil';
  else if (/HIT/.test(f)) code = 'Hit';
  
  return {
    code: code,
    description: state.editTypeMap[code] || state.editTypeMap['Ful'] || 'Full'
  };
}

function getVersionType(title, isMain) {
  if (isMain === 'Y') return '';
  const t = String(title).toUpperCase();
  if (/_DRUMS_BASS|_DRUMS_BASS/.test(t)) return 'Underscore';
  if (/_NO_DRUMS/.test(t)) return 'Underscore 2';
  if (/_NO_VOCALS/.test(t)) return 'Instrumental';
  if (/_INSTRUMENTAL/.test(t)) return 'Instrumental';
  if (/_UNDERSCORE/.test(t)) return 'Underscore';
  return '';
}

function getWorkName(title, isMain) {
  if (isMain === 'Y') return title;
  return String(title)
    .replace(/_Drums_Bass/gi,'').replace(/_Drums_bass/gi,'')
    .replace(/_No_Drums/gi,'').replace(/_No_Vocals/gi,'')
    .replace(/_Instrumental/gi,'').replace(/_Underscore/gi,'')
    .replace(/_30$/,'').replace(/_60$/,'').replace(/_30_/g,'_').replace(/_60_/g,'_')
    .replace(/_+$/,'').trim();
}

function getMoods(keywords) {
  if (!keywords) return null;
  // Only take moods before "African" tag
  const parts = String(keywords).split(',').map(k => k.trim());
  const moods = [];
  for (const part of parts) {
    if (part.toLowerCase() === 'african') break;
    if (part) moods.push(part);
  }
  return moods.length ? moods.join(';') : null;
}

function getMusicFor(musicFor) {
  if (!musicFor) return null;
  // Convert comma-separated to semicolon-separated, preserving all values
  const parts = String(musicFor).split(',').map(k => k.trim()).filter(k => k);
  return parts.length ? parts.join(';') : null;
}

function getMusicForFromKeywords(keywords) {
  if (!keywords) return null;
  // Extract Music For tags from keywords (tags like Youth Energy, Action, Urban Drama, Promos, etc.)
  const parts = String(keywords).split(',').map(k => k.trim());
  const musicFor = parts.filter(p => MUSIC_FOR_TAGS.has(p));
  return musicFor.length ? musicFor.join(';') : null;
}

function safeStr(val) {
  if (val === null || val === undefined || val === '' || (typeof val === 'number' && isNaN(val))) return null;
  return val;
}

function parseMDML385Sheet(sheetData) {
  const rows = sheetData.filter(r => r['TRACK: Title']);
  
  const parentDesc = {};
  rows.forEach(r => {
    if (r['TRACK: Is Main'] === 'Y') {
      const wn = String(r['TRACK: Title']);
      parentDesc[wn] = r['TRACK: Description'] || null;
    }
  });

  return rows.map((row, idx) => {
    const isMain = row['TRACK: Is Main'] === 'Y' ? 'Y' : 'N';
    const title = String(row['TRACK: Title'] || '');
    const workName = getWorkName(title, isMain);
    const audioFile = row['TRACK: Audio Filename'] || row['TRACK: Title'];
    const kw = row['TRACK: Keywords'] || '';

    const r = {};
    r['Column Name'] = null;
    r['Label Prefix'] = 'AFRS';
    r['Label Name'] = 'AFROSONIC';
    r['Album Prefix'] = null;
    r['Album Catalogue Number'] = null;
    r['Album Suffix'] = null;
    r['Album Overide'] = null;
    r['Album Title'] = safeStr(row['ALBUM: Title']);
    r['Album Description'] = safeStr(row['ALBUM: Description']);
    r['Release Date'] = formatReleaseDate(row['ALBUM: Release Date']);
    r['Album Categories'] = null;
    r['Track No'] = row['TRACK: Number'];
    r['Is this the Work'] = isMain;
    
    r['Work Name'] = workName;
    
    // For main tracks, use description. For alt tracks, it should remain blank.
    if (isMain === 'Y') {
      r['Work Description'] = safeStr(row['TRACK: Description']) || null;
    } else {
      r['Work Description'] = null;
    }
    
    r['Version Type'] = getVersionType(title, isMain);
    const editTypeInfo = getEditType(audioFile);
    r['EditType'] = editTypeInfo.code;
    
    // For alt tracks, extract version info from title into Version Description
    // For main tracks, use the EditType mapping
    if (isMain === 'N') {
      let versionDesc = null;
      if (/_DRUMS[_\s]&[_\s]BASS|_DRUMS_BASS/i.test(title)) versionDesc = 'Drums & Bass Mix';
      else if (/_NO[_\s]DRUMS/i.test(title)) versionDesc = 'No Drums Mix';
      else if (/_NO[_\s]VOCALS/i.test(title)) versionDesc = 'No Vocals Mix';
      else if (/_INSTRUMENTAL/i.test(title)) versionDesc = 'Instrumental Mix';
      else if (/_UNDERSCORE/i.test(title)) versionDesc = 'Underscore Mix';
      else if (/_30[_\s]|_30$/i.test(title)) versionDesc = '30 Second Edit';
      else if (/_60[_\s]|_60$/i.test(title)) versionDesc = '60 Second Edit';
      r['Version Description'] = versionDesc || editTypeInfo.description;
    } else {
      r['Version Description'] = editTypeInfo.description;
    }
    r['Duration'] = durationToSeconds(row['TRACK: Duration']);
    r['BPM'] = safeStr(row['TRACK: BPM']);

    for (let i = 1; i <= 10; i++) {
      const fn = row[`WRITER:${i}: First Name`];
      const mn = row[`WRITER:${i}: Middle Name`];
      const ln = row[`WRITER:${i}: Last Name`];
      const forenameArr = [fn, mn].filter(x => x != null && x !== '' && x !== undefined);
      r[`Comp Surname ${i}`] = safeStr(ln);
      r[`Comp Forename ${i}`] = forenameArr.length ? forenameArr.join(' ') : null;
      r[`Composer ${i} Society`] = safeStr(row[`WRITER:${i}: Society`]);
      r[`Composer ${i} CAE`] = safeStr(row[`WRITER:${i}: IPI`]);
      r[`Comp Split${i} %`] = safeStr(row[`WRITER:${i}: Owner Performance Share %`]);
      r[`Composer ${i} Capacity`] = safeStr(row[`WRITER:${i}: Capacity`]);
    }

    for (let i = 1; i <= 6; i++) {
      r[`Publisher ${i} Name`] = safeStr(row[`PUBLISHER:${i}: Name`]);
      r[`Publisher ${i} Affiliation`] = safeStr(row[`PUBLISHER:${i}: Society`]);
      r[`Publisher ${i} Split`] = safeStr(row[`PUBLISHER:${i}: Owner Performance Share %`]);
    }

    r['ISWC'] = safeStr(row['CODE: ISWC']);
    r['ISRC'] = reformatISRC(row['CODE: ISRC']);
    r['Lyrics'] = safeStr(row['TRACK: Lyrics']);
    r['Instruments'] = safeStr(row['TRACK: Instrumentation']);
    r['Country List'] = 'African;South Africa';
    r["Era's"] = null;
    // Only apply moods to main tracks
    r['Moods'] = isMain === 'Y' ? getMoods(kw) : null;
    // Extract Music For from Keywords (tags like Youth Energy, Action, Urban Drama, Promos, etc.)
    r['Music For'] = getMusicForFromKeywords(kw);
    r['Music Styles'] = null;
    r['Tempos'] = null; // Manual input field - left blank for user entry
    r['Well Known Tunes'] = null;
    r['Style-Alikes'] = null;
    r['Music Key'] = null;
    r['Artwork'] = safeStr(row['ALBUM: Artwork Filename']);
    r['Audio File Name'] = audioFile ? `${audioFile}.wav` : null;

    return r;
  });
}

function processFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        // Read once with raw:true and no cellDates — gives us pure values:
        // Duration as a decimal fraction (e.g. 0.003252), dates as serial numbers,
        // and text fields like Tempo as their actual full string with no truncation.
        const wb = XLSX.read(e.target.result, { type: 'array', cellDates: false });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const merged = XLSX.utils.sheet_to_json(ws, { defval: null, raw: true });

        if (!merged.length || !merged[0]['ALBUM: Code']) {
          reject(new Error(`"${file.name}" doesn't look like an MDML385 file`));
          return;
        }

        const tracks = parseMDML385Sheet(merged);
        const albumCode = merged[0]['ALBUM: Code'] || file.name.replace('.xlsx','');
        const albumTitle = merged[0]['ALBUM: Title'] || '(untitled)';
        const mainTracks = tracks.filter(t => t['Is this the Work'] === 'Y').length;

        resolve({
          id: Date.now() + Math.random(),
          filename: file.name,
          code: albumCode,
          title: albumTitle,
          trackCount: tracks.length,
          mainCount: mainTracks,
          tracks,
        });
      } catch(err) {
        reject(err);
      }
    };
    reader.onerror = () => reject(new Error(`Failed to read "${file.name}"`));
    reader.readAsArrayBuffer(file);
  });
}

function buildWarnings() {
  const warnings = [];
  state.files.forEach(file => {
    file.tracks.forEach(t => {
      if (!t['ISRC']) warnings.push({ file: file.code, track: t['Work Name'], field: 'ISRC', msg: 'Missing ISRC' });
      if (!t['Comp Surname 1']) warnings.push({ file: file.code, track: t['Work Name'], field: 'Composer', msg: 'No composer data' });
      if (!t['Publisher 1 Name']) warnings.push({ file: file.code, track: t['Work Name'], field: 'Publisher', msg: 'No publisher data' });
      if (!t['Moods']) warnings.push({ file: file.code, track: t['Work Name'], field: 'Moods', msg: 'No moods mapped' });
    });
  });
  return warnings;
}

// Column resize functionality
let resizing = null;
let startX = 0;
let startWidth = 0;

function initColumnResize(th) {
  const handle = document.createElement('div');
  handle.className = 'resize-handle';
  th.appendChild(handle);
  
  handle.addEventListener('mousedown', (e) => {
    e.preventDefault();
    e.stopPropagation();
    resizing = th;
    startX = e.pageX;
    startWidth = th.offsetWidth;
    handle.classList.add('resizing');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  });
}

document.addEventListener('mousemove', (e) => {
  if (!resizing) return;
  const diff = e.pageX - startX;
  const newWidth = Math.max(60, startWidth + diff);
  const colIndex = Array.from(resizing.parentNode.children).indexOf(resizing);
  
  // Update header
  resizing.style.width = newWidth + 'px';
  resizing.style.minWidth = newWidth + 'px';
  
  // Update all cells in this column
  const table = resizing.closest('table');
  if (table) {
    table.querySelectorAll('tbody tr:not(.album-separator)').forEach(row => {
      const cell = row.children[colIndex];
      if (cell) {
        cell.style.width = newWidth + 'px';
        cell.style.minWidth = newWidth + 'px';
      }
    });
  }
});

document.addEventListener('mouseup', () => {
  if (resizing) {
    resizing.querySelector('.resize-handle').classList.remove('resizing');
    resizing = null;
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  }
});

function renderTable() {
  const container = document.getElementById('tableContainer');
  const emptyState = document.getElementById('emptyState');
  const warnBadge = document.getElementById('warnBadge');

  if (state.files.length === 0) {
    emptyState.style.display = 'flex';
    container.innerHTML = '';
    container.appendChild(emptyState);
    return;
  }

  emptyState.style.display = 'none';

  if (state.view === 'warnings') {
    renderWarningsView(container);
    return;
  }
  
  if (state.view === 'admin') {
    renderAdminView(container);
    return;
  }

  const filter = state.filter.toLowerCase();
  const cols = PREVIEW_COLS;

  const table = document.createElement('table');
  const thead = document.createElement('thead');
  const headerRow = document.createElement('tr');
  const numTh = document.createElement('th');
  numTh.className = 'row-num';
  numTh.textContent = '#';
  numTh.style.width = '40px';
  numTh.style.minWidth = '40px';
  headerRow.appendChild(numTh);
  
  cols.forEach(col => {
    const th = document.createElement('th');
    th.textContent = col;
    th.style.minWidth = '100px';
    th.style.width = '120px';
    if (MANUAL_COLS.has(col)) {
      th.classList.add('col-orange');
      th.innerHTML += '<span class="req-dot"></span>';
    }
    initColumnResize(th);
    headerRow.appendChild(th);
  });
  thead.appendChild(headerRow);
  table.appendChild(thead);

  const tbody = document.createElement('tbody');
  let globalIdx = 1;

  state.files.forEach((file, fileIdx) => {
    const sepRow = document.createElement('tr');
    sepRow.className = 'album-separator';
    const sepTd = document.createElement('td');
    sepTd.colSpan = cols.length + 1;
    sepTd.textContent = `${file.code} — ${file.title}`;
    sepRow.appendChild(sepTd);
    tbody.appendChild(sepRow);

    file.tracks.forEach(track => {
      const wn = String(track['Work Name'] || '').toLowerCase();
      if (filter && !wn.includes(filter)) return;

      const tr = document.createElement('tr');
      tr.className = track['Is this the Work'] === 'Y' ? 'main-track' : 'alt-track';

      const numTd = document.createElement('td');
      numTd.className = 'row-num';
      numTd.textContent = globalIdx++;
      tr.appendChild(numTd);

      cols.forEach(col => {
        const td = document.createElement('td');
        const val = track[col];

        if (val === null || val === undefined || val === '') {
          td.className = MANUAL_COLS.has(col) ? 'manual-cell' : 'empty-cell';
          td.textContent = MANUAL_COLS.has(col) ? '—' : '';
        } else {
          td.textContent = String(val);
          if (col === 'Is this the Work' && val === 'Y') td.className = 'is-work-y';
          if (MANUAL_COLS.has(col)) td.style.background = 'var(--accent-light)';
        }

        td.title = val != null ? String(val) : '';
        tr.appendChild(td);
      });

      tbody.appendChild(tr);
    });
  });

  table.appendChild(tbody);

  const warnings = buildWarnings();
  if (warnings.length > 0) {
    warnBadge.textContent = ` (${warnings.length})`;
    warnBadge.style.display = 'inline';
  } else {
    warnBadge.style.display = 'none';
  }

  container.innerHTML = '';
  container.appendChild(table);
}

function renderWarningsView(container) {
  const warnings = buildWarnings();
  if (!warnings.length) {
    container.innerHTML = '<div class="empty-state" style="display:flex"><div class="empty-state-title" style="color:var(--success)">✓ No issues found</div></div>';
    return;
  }
  const table = document.createElement('table');
  const thead = document.createElement('thead');
  const headerRow = document.createElement('tr');
  ['File','Track','Field','Issue'].forEach(col => {
    const th = document.createElement('th');
    th.textContent = col;
    th.style.minWidth = '100px';
    th.style.width = '150px';
    initColumnResize(th);
    headerRow.appendChild(th);
  });
  thead.appendChild(headerRow);
  table.appendChild(thead);
  const tbody = document.createElement('tbody');
  warnings.forEach(w => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${w.file}</td><td>${w.track}</td><td style="color:var(--accent)">${w.field}</td><td>${w.msg}</td>`;

  });
  table.appendChild(tbody);
  container.innerHTML = '';
  container.appendChild(table);
}

function addEditType() {

  if (!code || !desc) {
    showToast('Please enter both EditType code and description', true);
    return;
  }
  
  state.editTypeMap[code] = desc;
  renderEditTypeMappings();
  
  codeInput.value = '';
  descInput.value = '';

  state.editTypeMap = { ...DEFAULT_EDITTYPE_MAP };

  // Get values from all description inputs
  document.querySelectorAll('.edit-desc-input').forEach(input => {

      state.editTypeMap[code] = desc;
    }

  showToast('EditType mappings saved successfully');
}

function exportMaster() {
  const btn = document.getElementById('exportBtn');
  btn.disabled = true;
  btn.textContent = 'Exporting…';
  setProgress(30);

  setTimeout(() => {
    try {
      const wb = XLSX.utils.book_new();
      const allRows = [];

      state.files.forEach(file => {
        file.tracks.forEach(track => {
          const row = {};
          AFRO_COLS.forEach(col => {
            let val = track[col];
            if (val === null || val === undefined) val = '';
            row[col] = val;
          });
          allRows.push(row);
        });
      });

      setProgress(60);

      const ws = XLSX.utils.json_to_sheet(allRows, { header: AFRO_COLS });

      ws['!cols'] = AFRO_COLS.map(col => ({ wch: Math.min(Math.max(col.length, 10), 35) }));

      XLSX.utils.book_append_sheet(wb, ws, 'Ingestion Template');
      setProgress(90);

      const date = new Date();
      const stamp = `${date.getFullYear()}${String(date.getMonth()+1).padStart(2,'0')}${String(date.getDate()).padStart(2,'0')}`;
      XLSX.writeFile(wb, `Afrosonic_Master_${stamp}.xlsx`);

      setProgress(100);
      showToast(`Exported ${allRows.length} tracks across ${state.files.length} file${state.files.length > 1 ? 's' : ''}`);
    } catch(err) {
      showToast('Export failed: ' + err.message, true);
    } finally {
      btn.disabled = false;
      btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg> Export Master .xlsx`;
      setTimeout(() => setProgress(0), 800);
    }
  }, 50);
}

  e.preventDefault();
  dropZone.classList.remove('dragover');
  handleFiles([...e.dataTransfer.files]);
});
fileInput.addEventListener('change', () => handleFiles([...fileInput.files]));

async function handleFiles(files) {
  const xlsxFiles = files.filter(f => f.name.endsWith('.xlsx'));
  if (!xlsxFiles.length) { showToast('Please drop .xlsx files only', true); return; }

  setStatus('processing…', true);
  setProgress(10);

  let loaded = 0;
  for (const file of xlsxFiles) {
    if (state.files.find(a => a.filename === file.name)) {
      showToast(`"${file.name}" already loaded`);
      continue;
    }
    try {
      const fileData = await processFile(file);
      state.files.push(fileData);
      loaded++;
      setProgress(10 + (loaded / xlsxFiles.length) * 80);
    } catch(err) {
      showToast(err.message, true);
    }
  }

  setProgress(100);
  setTimeout(() => setProgress(0), 600);
  setStatus(state.files.length ? `${state.files.length} file${state.files.length > 1 ? 's' : ''} loaded` : 'idle', state.files.length > 0);
  renderQueue();
  renderTable();
  fileInput.value = '';
  if (loaded) showToast(`Loaded ${loaded} file${loaded > 1 ? 's' : ''} successfully`);
}

document.getElementById('fileQueue').addEventListener('click', e => {
  const btn = e.target.closest('.file-remove');
  if (!btn) return;
  const id = parseFloat(btn.dataset.id);
  state.files = state.files.filter(a => a.id !== id);
  renderQueue();
  renderTable();
  if (!state.files.length) setStatus('idle');
});

document.getElementById('clearBtn').addEventListener('click', () => {
  state.files = [];
  renderQueue();
  renderTable();
  setStatus('idle');
});

document.getElementById('exportBtn').addEventListener('click', exportMaster);

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    state.view = tab.dataset.view;
    renderTable();
  });
});

document.getElementById('searchFilter').addEventListener('input', e => {
  state.filter = e.target.value;
  renderTable();
});

renderQueue();
</script>
</body>
</html>
